<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF7E40" />
      <stop offset="100%" stop-color="#E8630A" />
    </linearGradient>
    
    <!-- Accent glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Base Rounded Rectangle for App Icon -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)" />

  <!-- Outer Ring Plate -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="#FFFFFF" stroke-width="16" opacity="0.9" />
  
  <!-- Inner Ring Plate -->
  <circle cx="256" cy="256" r="100" fill="none" stroke="#FFFFFF" stroke-width="6" opacity="0.5" />

  <!-- Fork (Left side) -->
  <g fill="#FFFFFF" transform="translate(190, 166) scale(0.9)" filter="url(#glow)">
    <!-- Tines -->
    <path d="M 0,0 C 5,0 10,5 10,15 L 10,60 C 10,65 5,70 0,70 C -5,70 -10,65 -10,60 L -10,15 C -10,5 -5,0 0,0 Z" />
    <path d="M -20,10 C -15,10 -10,15 -10,25 L -10,60 C -10,65 -15,70 -20,70 C -25,70 -30,65 -30,60 L -30,25 C -30,15 -25,10 -20,10 Z" />
    <path d="M 20,10 C 25,10 30,15 30,25 L 30,60 C 30,65 25,70 20,70 C 15,70 10,65 10,60 L 10,25 C 10,15 15,10 20,10 Z" />
    <!-- Base and Handle -->
    <path d="M -30,60 L 30,60 C 30,90 10,100 8,110 L 8,190 C 8,196 4,200 0,200 C -4,200 -8,196 -8,190 L -8,110 C -10,100 -30,90 -30,60 Z" />
  </g>

  <!-- Knife (Right side) -->
  <g fill="#FFFFFF" transform="translate(322, 166) scale(0.9)" filter="url(#glow)">
    <!-- Blade -->
    <path d="M -10,0 C 0,0 20,20 20,60 L 20,110 C 20,115 10,120 0,120 L -10,120 L -10,0 Z" />
    <!-- Handle -->
    <path d="M -10,120 L 10,120 C 10,125 6,130 6,135 L 6,190 C 6,196 2,200 -2,200 C -6,200 -10,196 -10,190 L -10,120 Z" />
  </g>

  <!-- Small Elegant Leaf (Health representation at top right) -->
  <path d="M 330,140 C 330,110 360,110 370,100 C 370,120 350,140 330,140 Z" fill="#4CAF50" />
  <path d="M 370,100 C 380,110 380,130 360,140 C 350,130 350,110 370,100 Z" fill="#81C784" />
</svg>
